<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Basta. — Conectar conta</title>
  <meta name="theme-color" content="#1A1A1A" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── TOKENS ─────────────────────────────────────────────── */
    :root {
      --black:      #1A1A1A;
      --white:      #FFFFFF;
      --off-white:  #F5F3EF;
      --green:      #42b449;
      --green-light: rgba(66, 180, 73, 0.08);
      --gray-600:   #4A4A4A;
      --gray-300:   #D4D4D4;

      --f: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --t: 240ms var(--ease);
    }

    /* ── RESET ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: clip; }
    body {
      font-family: var(--f);
      font-size: 18px;
      line-height: 1.6;
      color: var(--black);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    :where(button, a) { border-radius: 0; }
    :focus-visible { outline: 2px solid var(--green); outline-offset: 3px; }
    :focus:not(:focus-visible) { outline: none; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
    }

    /* ── OVERLAY ────────────────────────────────────────────── */
    .overlay {
      min-height: 100vh;
      min-height: 100dvh;
      background-color: var(--black);
      background-image:
        linear-gradient(135deg, rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(45deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }

    /* ── MODAL ──────────────────────────────────────────────── */
    .modal {
      background: var(--white);
      width: 100%;
      max-width: 480px;
      position: relative;
      animation: modalIn 0.32s var(--ease) both;
      border: 1.5px solid var(--black);
    }

    @keyframes modalIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HEADER — logo esq + fechar dir (padrão 07) ─────────── */
    .modal__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 32px 40px 28px;
      flex-shrink: 0;
    }

    .modal__close {
      width: 32px;
      height: 32px;
      border: 1.5px solid var(--gray-300);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: none;
      color: var(--gray-600);
      transition: border-color var(--t), color var(--t);
    }

    .modal__close:hover { border-color: var(--black); color: var(--black); }

    /* ── BODY ───────────────────────────────────────────────── */
    .modal__body {
      padding: 0 40px 40px;
    }

    /* ── TÍTULO — padrão .modal__title (06 e 07) ────────────── */
    .modal__title {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: 8px;
    }

    .modal__title span { color: var(--green); }

    .modal__subtitle {
      display: block;
      font-size: 15px;
      font-weight: 400;
      color: var(--gray-600);
      line-height: 1.5;
      margin-bottom: 20px;
    }

    /* ── BANCO SELECIONADO ───────────────────────────────────── */
    .bank-chip {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--off-white);
      padding: 12px 16px;
      margin-bottom: 16px;
    }

    .bank-chip__icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 800;
      color: var(--white);
      flex-shrink: 0;
      letter-spacing: 0.04em;
    }

    .bank-chip__name {
      font-size: 15px;
      font-weight: 700;
      color: var(--black);
    }

    .bank-chip__change {
      margin-left: auto;
      font-size: 12px;
      font-weight: 600;
      color: var(--green);
      text-decoration: underline;
      text-underline-offset: 2px;
      cursor: pointer;
      transition: color var(--t);
      padding: 8px 4px;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
    }

    .bank-chip__change:hover { color: var(--black); }

    /* ── CPF — preenchido automaticamente ───────────────────── */
    .cpf-block {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--off-white);
      border-left: 3px solid var(--green);
      padding: 12px 16px;
      margin-bottom: 20px;
    }

    .cpf-block__content { flex: 1; }

    .cpf-block__label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--green);
      margin-bottom: 2px;
    }

    .cpf-block__value {
      font-size: 15px;
      font-weight: 700;
      color: var(--black);
      letter-spacing: 0.04em;
    }

    .cpf-block__note {
      font-size: 12px;
      color: #999;
      font-weight: 400;
    }

    /* ── BLOCO DE SEGURANÇA ─────────────────────────────────── */
    .security-block {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--off-white);
      border-left: 3px solid var(--gray-300);
      padding: 14px 16px;
      margin-bottom: 28px;
      color: var(--black);
      font-size: 14px;
      font-weight: 600;
    }

    .security-block__icon {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    /* ── CTA — padrão .btn (06) ─────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--f);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 18px 36px;
      min-height: 56px;
      border: none;
      cursor: pointer;
      border-radius: 0;
      transition: background var(--t), color var(--t), border-color var(--t);
      width: 100%;
    }

    .btn-primary { background: var(--green); color: var(--white); }
    .btn-primary:hover { background: var(--black); }
    .btn-primary:active { transform: scale(0.98); }

    .btn__arrow { font-size: 1.2em; transition: transform var(--t); }
    .btn-primary:hover .btn__arrow { transform: translateX(3px); }

    /* ── LOADING STATE ──────────────────────────────────────── */
    .btn--loading {
      pointer-events: none;
      position: relative;
      color: transparent;
    }

    .btn--loading::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVO ─────────────────────────────────────────── */
    @media (max-width: 540px) {
      .overlay {
        padding: 20px;
        align-items: center;
        background-color: rgba(26, 26, 26, 0.72);
        background-image: none;
      }

      .modal {
        max-width: 100%;
        animation: slideUp 0.32s var(--ease) both;
        max-height: calc(100dvh - 40px);
        max-height: calc(100vh - 40px);
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .modal__header { padding: 24px 24px 20px; }
      .modal__header > svg { height: 28px; }
      .modal__close { width: 44px; height: 44px; }

      .modal__body { padding: 0 24px 32px; }

      .modal__title { font-size: 24px; margin-bottom: 6px; }
      .modal__subtitle { font-size: 14px; margin-bottom: 16px; }

      .security-block { font-size: 13px; padding: 12px 14px; }

      .btn { font-size: 14px; min-height: 52px; }
    }

    @media (max-width: 390px) {
      .modal__title { font-size: 22px; }
      .bank-chip__name { font-size: 14px; }
      .cpf-block__value { font-size: 14px; }
    }

    @supports (padding: env(safe-area-inset-bottom)) {
      .modal__body {
        padding-bottom: max(40px, env(safe-area-inset-bottom));
      }
      @media (max-width: 540px) {
        .modal__header {
          padding-top: max(24px, env(safe-area-inset-top));
        }
        .modal__body {
          padding-bottom: max(32px, env(safe-area-inset-bottom));
        }
      }
    }

    /* ── CONFIRM MODAL ─────────────────────────────────────── */
    .confirm-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(26,26,26,0.55);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .confirm-overlay.is-open {
      opacity: 1; pointer-events: auto;
    }
    .confirm-box {
      background: var(--white);
      padding: 32px;
      max-width: 360px;
      width: 100%;
      text-align: center;
    }
    .confirm-box__title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .confirm-box__desc {
      font-size: 14px;
      color: var(--gray-600);
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .confirm-box__actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .confirm-box__btn {
      padding: 10px 20px;
      font-family: var(--f);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.24s, border-color 0.24s;
    }
    .confirm-box__btn--cancel {
      background: transparent;
      color: var(--black);
      border: 1.5px solid var(--gray-300);
    }
    .confirm-box__btn--cancel:hover {
      border-color: var(--black);
      background: var(--off-white);
    }
    .confirm-box__btn--confirm {
      background: var(--black);
      color: var(--white);
      border: 1.5px solid var(--black);
    }
    .confirm-box__btn--confirm:hover {
      background: var(--gray-600);
    }
    .confirm-box__btn:active { transform: scale(0.98); }
  </style>
</head>
<body>

<div class="overlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">

    <!-- ── HEADER ──────────────────────────────────────────── -->
    <div class="modal__header">

      <svg height="36" viewBox="0 0 602.25 254.23" xmlns="http://www.w3.org/2000/svg" aria-label="Basta.">
        <path fill="#1A1A1A" d="M0,1.25h48.07c27.52,0,43.03,9.7,53.5,43.21l2.71,8.77c6.59,21.29.78,32.56-13.96,38.51l.78,2.5c23.26,3.76,30.24,14.09,36.44,33.5l22.49,72.01c10.85,35.07-8.14,51.97-37.6,51.97h-34.89L0,1.25ZM63.58,81.72h4.26c4.26,0,5.81-3.13,4.26-8.14l-10.86-35.07c-1.94-5.95-3.88-7.51-9.3-7.51h-3.88l15.51,50.72ZM106.99,221.98h4.26c4.26,0,5.81-3.45,4.26-8.45l-30.24-97.68c-1.55-5.64-3.88-7.2-9.3-7.2h-3.88l34.89,113.34Z"/>

        <path fill="#1A1A1A" d="M389.48,230.43l-51.56-166.88h-11.63l-8.91-29.12h11.63L318.15,0h37.99l10.85,34.44h11.63l8.92,29.12h-11.63l47.68,154.35c.78,2.82,1.94,3.44,5.43,3.44h7.37l8.91,29.12h-22.48c-18.61,0-28.69-5.01-33.34-20.04Z"/>

        <path fill="#1A1A1A" d="M563.49,208.2h38.77v42.27h-38.77v-42.27Z"/>
      </svg>

      <button class="modal__close" aria-label="Fechar" onclick="history.back()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>

    </div>

    <!-- ── BODY ────────────────────────────────────────────── -->
    <div class="modal__body">

      <h2 class="modal__title" id="modal-title">
        Conecte sua Conta<span>.</span>
      </h2>
      <span class="modal__subtitle">Suas informações usadas a seu favor, contra o endividamento.</span>

      <!-- Banco selecionado -->
      <div class="bank-chip">
        <div class="bank-chip__icon" style="background: #8A05BE;">NU</div>
        <span class="bank-chip__name">Nubank</span>
        <a class="bank-chip__change" href="#" onclick="openConfirmChange(); return false;">Trocar</a>
      </div>

      <!-- CPF preenchido automaticamente -->
      <div class="cpf-block">
        <div class="cpf-block__content">
          <div class="cpf-block__label">Preenchido automaticamente</div>
          <div class="cpf-block__value">•••.•••.456-09</div>
        </div>
        <span class="cpf-block__note">CPF</span>
      </div>

      <!-- Bloco de segurança — da captura de tela -->
      <div class="security-block">
        <span class="security-block__icon" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
        </span>
        Conexão segura · Seus dados são criptografados
      </div>

      <!-- CTA -->
      <button type="button" class="btn btn-primary" id="connect-btn" aria-disabled="false" onclick="handleConnect()">
        <span class="btn__text">Conectar Minha Conta <span class="btn__arrow">&rarr;</span></span>
      </button>

    </div>

  </div>
</div>

<script>
  function handleConnect() {
    const btn = document.getElementById('connect-btn');
    btn.classList.add('btn--loading');
    btn.setAttribute('aria-disabled', 'true');
    // Redireciona para TELA 09 após loading
    setTimeout(() => { window.location.href = '09_basta-of-instrucao-banco.html'; }, 1200);
  }

  function openConfirmChange() {
    document.getElementById('confirmChange').classList.add('is-open');
    document.body.style.overflow = 'hidden';
  }

  function closeConfirmChange() {
    document.getElementById('confirmChange').classList.remove('is-open');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && document.getElementById('confirmChange').classList.contains('is-open')) {
      closeConfirmChange();
    }
  });
</script>

<div class="confirm-overlay" id="confirmChange">
  <div class="confirm-box" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
    <h3 class="confirm-box__title" id="confirmTitle">Trocar de banco?</h3>
    <p class="confirm-box__desc">Você perderá os dados preenchidos e voltará à seleção de banco.</p>
    <div class="confirm-box__actions">
      <button class="confirm-box__btn confirm-box__btn--cancel" onclick="closeConfirmChange()">Cancelar</button>
      <a href="07_basta-of-selecao-banco.html" class="confirm-box__btn confirm-box__btn--confirm" style="text-decoration:none;">Trocar</a>
    </div>
  </div>
</div>

</body>
