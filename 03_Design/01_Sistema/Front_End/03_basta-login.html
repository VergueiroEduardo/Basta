<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Basta. — Entrar</title>
  <meta name="description" content="Entre na sua conta Basta e continue negociando suas dívidas." />
  <meta name="theme-color" content="#000000" />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- BASTA FOUNDATION INJECTED -->
  <link rel="stylesheet" href="_foundation/tokens.css" />
  <link rel="stylesheet" href="_foundation/reset.css" />
  <link rel="stylesheet" href="_foundation/responsive.css" />
  <link rel="stylesheet" href="_foundation/animations.css" />
  <link rel="stylesheet" href="_foundation/typography.css" />
  <link rel="stylesheet" href="_foundation/layout.css" />
  <link rel="stylesheet" href="_foundation/grid.css" />
  <link rel="stylesheet" href="_components/logo.css" />
  <link rel="stylesheet" href="_components/btn.css" />
  <link rel="stylesheet" href="_components/form.css" />
  <style>

    /* ── RESET ──────────────────────────────────────────────── */    body {
      font-family: var(--f);
      font-size: 18px;
      line-height: 1.6;
      color: var(--black);
      background: var(--white);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }    input { font-family: inherit; }
    :where(button, a, input, select, textarea) { border-radius: 0; -webkit-appearance: none; }

    /* ── ACESSIBILIDADE ─────────────────────────────────────── */
    .skip-link {
      position: absolute; top: -6rem; left: 24px;
      background: var(--green); color: var(--white);
      font-size: 14px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 14px 24px; z-index: 9999; transition: top var(--t);
    }
    .skip-link:focus { top: 1rem; }    /* ── LAYOUT PRINCIPAL ───────────────────────────────────── */
    .register-page {
      display: flex;
      min-height: 100vh;
      min-height: 100dvh;
    }

    /* ── SIDEBAR ────────────────────────────────────────────── */
    .sidebar {
      width: 440px;
      background: var(--black);
      color: var(--white);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .sidebar__logo { margin-bottom: 48px; }

    .sidebar__headline {
      font-size: clamp(32px, 3.5vw, 48px);
      font-weight: 800;
      line-height: 1.02;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }

    .sidebar__headline-accent { color: var(--green); }

    .sidebar__subtext {
      font-size: 15px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.5);
      line-height: 1.6;
      max-width: 300px;
    }

    .sidebar::after { display: none; }

    /* ── FORM AREA ──────────────────────────────────────────── */
    /* ── FORM HEADER ────────────────────────────────────────── */
    /* ── FORM CORE ──────────────────────────────────────────── */
    /* ── FORM ELEMENTS ──────────────────────────────────────── */
    /* ── FORM VALIDATION ───────────────────────────────────── */
    /* ── FORM FIELDS BLOCK ─────────────────────────────────── */
    /* ── FORGOT PASSWORD LINK ───────────────────────────────── */
    .form-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .form-label-row .form-label { margin-bottom: 0; }

    .forgot-link {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-600);
      text-decoration: none;
      transition: color var(--t);
      letter-spacing: 0.02em;
      padding: 4px 0;
      margin-top: 8px;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
    }

    .forgot-link:hover { color: var(--green); }

    /* ── PASSWORD TOGGLE ────────────────────────────────────── */
    .password-wrapper { position: relative; }
    .password-wrapper .form-input { padding-right: 48px; }

    .password-toggle {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      cursor: pointer;
      color: #999;
      transition: color var(--t);
      padding: 0;
      border: none;
      background: none;
    }

    .password-toggle:hover { color: var(--black); }

    /* ── BOTÃO FECHAR ────────────────────────────────────────── */
    .btn-close {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 80;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: var(--gray-600);
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
      text-decoration: none;
    }
    .btn-close:hover {
      color: var(--black);
      background: rgba(0,0,0,0.05);
      border-radius: 50%;
    }
    .btn-close:active {
      transform: scale(0.98);
    }

    /* ── CTA ─────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--f);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 18px 36px;
      min-height: 56px;
      border: none;
      cursor: pointer;
      border-radius: 0;
      transition: background var(--t), color var(--t), transform var(--t), border-color var(--t);
      width: 100%;
    }

    .btn-primary { background: var(--green); color: var(--white); }
    .btn-primary:hover { background: var(--black); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { background: var(--gray-300); color: #999; cursor: not-allowed; }

    .btn__arrow { font-size: 1.2em; transition: transform var(--t); }
    .btn-primary:hover .btn__arrow { transform: translateX(3px); }

    /* ── FOOTER LINKS ───────────────────────────────────────── */
    .form-terms {
      font-size: 12px;
      color: #999;
      margin-top: 16px;
      text-align: center;
      line-height: 1.5;
    }

    .form-terms a {
      color: var(--black);
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .form-terms a:hover { color: var(--green); }

    .form-login-link a {
      color: var(--black);
      font-weight: 700;
      text-decoration: none;
      border-bottom: 2px solid var(--green);
      padding-bottom: 1px;
      transition: border-color var(--t), color var(--t);
    }

    /* ── LOADING STATE ──────────────────────────────────────── */    .btn--loading {
      pointer-events: none;
      opacity: 0.7;
      position: relative;
    }
    .btn--loading .btn__text { visibility: hidden; }
    .btn--loading::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      top: 50%;
      left: 50%;
      margin: -9px 0 0 -9px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    /* ══════════════════════════════════════════════════════════
       RESPONSIVO
       ══════════════════════════════════════════════════════════ */

    /* Tablet */
    @media (max-width: 1024px) {
      .sidebar { width: 360px; padding: 40px; }
      .form-area { padding: 40px 48px; }
    }

    /* Mobile */
    @media (max-width: 768px) {
      .register-page { flex-direction: column; }

      .sidebar {
        width: 100%;
        padding: 24px 20px;
        min-height: auto;
        justify-content: flex-start;
        flex-direction: row;
        align-items: center;
        gap: 20px;
      }

      .sidebar__logo { margin-bottom: 0; flex-shrink: 0; max-width: 120px; }
      .sidebar__logo svg { width: 100%; height: auto; }

      .sidebar__text-group { flex: 1; min-width: 0; }

      .sidebar__headline {
        font-size: 18px;
        margin-bottom: 4px;
        white-space: normal;
        line-height: 1.2;
      }

      .sidebar__br { display: none; }

      .sidebar__subtext {
        font-size: 12px;
        max-width: 100%;
        line-height: 1.4;
        white-space: normal;
        word-break: break-word;
      }

      .sidebar::after { display: none; }

      .form-area {
        flex: 1;
        padding: 24px 20px 40px;
        align-items: flex-start;
      }

      .form-container { max-width: 100%; }

      .form-header { margin-bottom: 12px; }
      .form-title { font-size: 22px; margin-bottom: 4px; }

      .form-fields-block { padding: 16px 16px 4px; }

      .form-input { padding: 12px 14px; font-size: 16px; }

      .btn {
        font-size: 14px;
        padding: 16px 24px;
        min-height: 52px;
      }

      .form-terms { font-size: 11px; }
      .form-login-link { font-size: 13px; }
    }

    /* Small mobile */
    @media (max-width: 380px) {
      .sidebar { padding: 20px 16px; gap: 12px; }
      .sidebar__headline { font-size: 14px; }
      .sidebar__subtext { font-size: 11px; }

      .form-area { padding: 20px 16px 32px; }
      .form-fields-block { padding: 14px 12px 4px; }
    }

    /* Landscape mobile */
    @media (max-height: 500px) and (orientation: landscape) {
      .register-page { flex-direction: row; }

      .sidebar {
        width: 280px;
        padding: 24px;
        min-height: 100vh;
        min-height: 100dvh;
        flex-direction: column;
        align-items: flex-start;
        gap: 0;
      }

      .sidebar__logo { margin-bottom: 24px; max-width: 160px; }
      .sidebar__logo svg { width: 100%; height: auto; }
      .sidebar__headline { font-size: 24px; }

      .form-area { padding: 24px 32px; overflow-y: auto; }
    }

    /* Safe area */
    @supports (padding: env(safe-area-inset-top)) {
      .sidebar { padding-top: max(24px, env(safe-area-inset-top)); }
      .form-area {
        padding-bottom: max(40px, env(safe-area-inset-bottom));
        padding-left: max(20px, env(safe-area-inset-left));
        padding-right: max(20px, env(safe-area-inset-right));
      }
    }
  </style>
</head>
<body>

<div class="register-page">

  <!-- ── SIDEBAR ─────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar__logo">
      <svg style="color: var(--white)" aria-label="Basta." role="img" viewBox="0 0 602.25 254.23"><use href="#logo-basta"/></svg>
    </div>

  </aside>

  <!-- ── FORM AREA ───────────────────────────────────────── -->
  <main class="form-area" id="form-login">
    <div class="form-container">

      <div class="form-header">
        <h1 class="form-title">Acesse sua conta<span style="color:var(--green)">.</span></h1>
        <p class="form-subtitle">Siga as orientações e se reorganize financeiramente.</p>
      </div>

      <form novalidate onsubmit="event.preventDefault(); if(validateLogin()) simulateLoading(document.querySelector('.btn-primary'))">
        <div class="form-core">

          <!-- Bloco de campos -->
          <div class="form-fields-block">

            <!-- Email -->
            <div class="form-group">
              <label class="form-label" for="email">Email</label>
              <input type="email" id="email" class="form-input" placeholder="seu@email.com" autocomplete="email">
              <div class="form-error" id="email-error" hidden>
                <svg class="form-error__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                  <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span>Informe um email válido.</span>
              </div>
            </div>

            <!-- Senha -->
            <div class="form-group">
              <label class="form-label" for="senha">Senha</label>
              <div class="password-wrapper">
                <input type="password" id="senha" class="form-input" placeholder="Sua senha" autocomplete="current-password">
                <button type="button" class="password-toggle" aria-label="Mostrar senha" onclick="togglePassword('senha', this)">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
              <div class="form-error" id="senha-error" hidden>
                <svg class="form-error__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                  <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span>Mínimo de 8 caracteres.</span>
              </div>
              <a href="04_basta-recuperar-senha.html" class="forgot-link">Esqueceu a senha?</a>
            </div>

          </div>

          <!-- CTA -->
          <div class="form-cta">
            <button type="submit" class="btn btn-primary" aria-disabled="false">
              <span class="btn__text">Entrar <span class="btn__arrow">&rarr;</span></span>
            </button>
          </div>

        </div>

        <p class="form-login-link">
          Não tem conta? <a href="02_basta-cadastro.html">Criar conta</a>
        </p>

        <p class="form-terms">
          Ao entrar, você concorda com os <a href="#">Termos de Uso</a> e a <a href="#">Política de Privacidade</a>.
        </p>
      </form>

    </div>
  </main>

</div>

<script>
  /* ── FORM VALIDATION ────────────────────────────────────── */
  function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  function validateField(fieldId, isValid, errorMsg = '') {
    const field = document.getElementById(fieldId);
    const errorEl = document.getElementById(fieldId + '-error');

    if (!isValid) {
      field.classList.add('form-input--error');
      if (errorEl) {
        errorEl.removeAttribute('hidden');
        if (errorMsg) errorEl.querySelector('span').textContent = errorMsg;
      }
      return false;
    } else {
      field.classList.remove('form-input--error');
      if (errorEl) errorEl.setAttribute('hidden', '');
      return true;
    }
  }

  function validateLogin() {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;

    let isValid = true;

    isValid = validateField('email', email && validateEmail(email), 'Informe um email válido.') && isValid;
    isValid = validateField('senha', senha.length >= 8, 'Mínimo de 8 caracteres.') && isValid;

    return isValid;
  }

  // Validação no blur de cada campo
  document.getElementById('email')?.addEventListener('blur', function() {
    if (this.value.trim()) {
      validateField('email', validateEmail(this.value.trim()), 'Informe um email válido.');
    }
  });

  document.getElementById('senha')?.addEventListener('blur', function() {
    if (this.value) {
      validateField('senha', this.value.length >= 8, 'Mínimo de 8 caracteres.');
    }
  });

  /* ── LOADING STATE ──────────────────────────────────────── */
  function simulateLoading(btn) {
    btn.classList.add('btn--loading');
    btn.setAttribute('aria-disabled', 'true');
    setTimeout(function() {
      btn.classList.remove('btn--loading');
      btn.setAttribute('aria-disabled', 'false');
    }, 2000);
  }

  /* ── TOGGLE PASSWORD ────────────────────────────────────── */
  function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') {
      input.type = 'text';
      btn.setAttribute('aria-label', 'Ocultar senha');
      btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    } else {
      input.type = 'password';
      btn.setAttribute('aria-label', 'Mostrar senha');
      btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    }
  }
</script>

</body>
