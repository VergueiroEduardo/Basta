<html lang="pt-BR">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

  <meta charset="UTF-8">
  <title>Basta — Social Media Gallery</title>  <style>
    @font-face {
      font-family: 'PlusJakarta';
      src: url('PlusJakartaSans-Regular.ttf') format('truetype');
      font-weight: 400; font-style: normal; font-display: block;
    }
    @font-face {
      font-family: 'PlusJakarta';
      src: url('PlusJakartaSans-SemiBold.ttf') format('truetype');
      font-weight: 600; font-style: normal; font-display: block;
    }
    @font-face {
      font-family: 'PlusJakarta';
      src: url('PlusJakartaSans-Bold.ttf') format('truetype');
      font-weight: 700; font-style: normal; font-display: block;
    }
    @font-face {
      font-family: 'PlusJakarta';
      src: url('PlusJakartaSans-ExtraBold.ttf') format('truetype');
      font-weight: 800; font-style: normal; font-display: block;
    }
  </style>
  <style>

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0e0e0e;
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* ── Barra ── */
    .bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 44px;
      background: #161616;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 20px;
      z-index: 100;
      font-size: 11.5px;
      color: #555;
    }
    .bar b  { color: #bbb; font-weight: 600; }
    .bar kbd {
      background: #222;
      border: 1px solid #333;
      border-radius: 3px;
      padding: 1px 5px;
      font-family: monospace;
      font-size: 10.5px;
      color: #999;
    }
    .bar .sep { width: 1px; height: 16px; background: #2a2a2a; }

    /* ── Grade 5 × 10 ── */
    .gallery {
      padding: 60px 32px 48px;
      display: grid;
      grid-template-columns: repeat(5, 270px);  /* 25 % de 1080px */
      gap: 20px 16px;
    }

    /* ── Card ── */
    .card {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .card-id  { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: #888; }
    .card-dim { font-size: 9px; color: #3a3a3a; letter-spacing: .03em; }

    /* ── Post wrapper ── */
    /* Feed 1080×1350 → 25% → 270×337.5 */
    .wrap {
      width: 270px;
      height: 337px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 8px 32px rgba(0,0,0,.55);
      cursor: pointer;
      transition: box-shadow .15s;
    }
    .wrap:hover { box-shadow: 0 12px 40px rgba(0,0,0,.8); }

    /* ── Post real 1080×1350 (captura DevTools aqui) ── */
    .post {
      width: 1080px;
      height: 1350px;
      background: #fff;
      position: absolute;
      top: 0; left: 0;
      transform: scale(.25);
      transform-origin: top left;
      overflow: hidden;

      /* tokens Basta */
      --black:    #1A1A1A;
      --white:    #FFFFFF;
      --green:    #42b449;
      --font:     'PlusJakarta', sans-serif;
      --lh-tight: 1.02;
      --lh-snug:  1.2;
      --ls-tight: -0.03em;
      --ls-snug:  -0.01em;
    }

    /* elementos internos */
    .logo { position: absolute; top: 88px; left: 80px; }
    .logo svg { display: block; fill: var(--black); }

    .content { position: absolute; bottom: 104px; left: 80px; right: 80px; }

    .hook {
      font-family: var(--font);
      font-weight: 800;
      font-size: 66px;
      line-height: var(--lh-tight);
      letter-spacing: var(--ls-tight);
      color: var(--black);
      margin-bottom: 48px;
    }

    .post-sep { width: 44px; height: 2px; background: var(--black); }

    .body {
      font-family: var(--font);
      font-weight: 400;
      font-size: 36px;
      line-height: 1.45;
      letter-spacing: var(--ls-snug);
      color: var(--black);
      opacity: 0.72;
      margin-top: 28px;
    }

    .hook-xl {
      font-size: 88px;
      margin-bottom: 32px;
    }

    .of-block { display: flex; flex-direction: column; gap: 0px; margin-top: 43px; }
    .of-logo { margin-bottom: 12px; }
    .of-logo svg { display: block;
      margin-top: -73px;
      margin-bottom: -74px; }

    .of-header {
      font-family: var(--font); font-weight: 400; font-size: 28px;
      line-height: 1.45; letter-spacing: var(--ls-snug); color: var(--black);
    }
    .of-cta {
      font-family: var(--font); font-weight: 800; font-size: 30px;
      line-height: var(--lh-snug); letter-spacing: var(--ls-tight); color: var(--black);
    }
    .of-sub {
      font-family: var(--font); font-weight: 400; font-size: 28px;
      line-height: 1.45; letter-spacing: var(--ls-snug); color: var(--black);
    }

    /* ── Tema escuro ── */
    .post.dark {
      background: #1A1A1A;
      --black: #FFFFFF;
      --white: #1A1A1A;
    }

    /* ── CTA post ── */
    .post.cta-post {
      background: #1A1A1A;
      --black: #FFFFFF;
    }
    .post.cta-post .logo svg {
      height: 250px;
      width: auto;
    }
    .post.cta-post.cta-light {
      background: #FFFFFF;
      --black: #1A1A1A;
    }
    .cta-content {
      position: absolute;
      top: 606px;
      left: 80px;
      right: 80px;
    }
    .cta-hook {
      font-family: var(--font);
      font-weight: 800;
      font-size: 80px;
      line-height: var(--lh-tight);
      letter-spacing: var(--ls-tight);
      color: var(--black);
      margin-bottom: 28px;
    }
    .cta-sub-bold {
      font-family: var(--font);
      font-weight: 800;
      font-size: 30px;
      line-height: var(--lh-snug);
      letter-spacing: var(--ls-snug);
      color: var(--black);
      margin-bottom: 8px;
    }
    .cta-sub-body {
      font-family: var(--font);
      font-weight: 600;
      font-size: 38px;
      line-height: 1.45;
      letter-spacing: var(--ls-snug);
      color: var(--black);
      opacity: 0.72;
    }
    .cta-btn {
      position: absolute;
      bottom: 88px;
      left: 80px;
      right: 80px;
      background: var(--green);
      border-radius: 20px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 52px;
    }
    .cta-btn-label {
      font-family: var(--font);
      font-weight: 800;
      font-size: 38px;
      letter-spacing: 0.04em;
      color: var(--white);
    }

    /* ── Post tema verde ── */
    .post.green-post {
      background: var(--green);
      /* --black permanece #1A1A1A → logo e texto ficam pretos */
    }
    .post.green-post .logo {
      top: auto;
      bottom: 500px; /* 80px margem + 337px texto (5 linhas × 66px × lh 1.02) + 83px gap */
    }
    .post.green-post .logo svg {
      height: 250px;
      width: auto;
    }
    .post.green-post .content {
      bottom: 80px; /* alinha margem inferior com as margens laterais */
    }
    #feed-13 .logo {
      bottom: 365px; /* 80px margem + 202px texto (3 linhas × 66px × lh 1.02) + 83px gap */
    }
    #feed-33 .logo {
      bottom: 432px; /* 80px margem + 269px texto (4 linhas × 66px × lh 1.02) + 83px gap */
    }
    #feed-43 .logo {
      bottom: 584px; /* 80px margem + 421px bloco (hook 4L + body 2L) + 83px gap */
    }
    #feed-48 .logo,
    #feed-49 .logo,
    #feed-50 .logo {
      top: auto;
      bottom: 500px; /* igual Feed 46/47: 80px + 337px (5L) + 83px gap */
    }
    #feed-48 .logo svg,
    #feed-49 .logo svg,
    #feed-50 .logo svg {
      height: 250px;
      width: auto;
    }
    #feed-48 .content,
    #feed-49 .content,
    #feed-50 .content {
      bottom: 80px;
    }

    /* ── Alinhamento horizontal de grade: Feeds 17–19 e 23–24 ── */
    #feed-17 .content,
    #feed-18 .content,
    #feed-19 .content,
    #feed-23 .content,
    #feed-24 .content {
      bottom: auto;
      top: 751px; /* topo do hook alinhado pela grade — Feed 19/24 são a referência */
    }

    /* ── Post só com logo Open Finance centralizado ── */
    .post.of-only .of-center {
      position: absolute;
      top: 50%;
      left: 80px;
      right: 80px;
      transform: translateY(-50%);
    }
    .post.of-only .of-center svg {
      height: 321px; /* 214 × 1.5 */
      width: auto;
      display: block;
    }
    .post.of-only .of-hook {
      font-family: var(--font);
      font-weight: 800;
      font-size: 66px;
      line-height: var(--lh-tight);
      letter-spacing: var(--ls-tight);
      color: var(--black);
      margin-top: -100px; /* compensa sobra inferior do viewBox do SVG_OF */
    }
    .post.of-only .of-body {
      font-family: var(--font);
      font-weight: 400;
      font-size: 28px;
      line-height: 1.45;
      letter-spacing: var(--ls-snug);
      color: var(--black);
      margin-top: 28px;
      max-width: 920px;
    }

    /* ── Tema imagem de fundo ── */
    .post.has-bg {
      --black: #FFFFFF;
      --white: #1A1A1A;
    }
    .post.has-bg .bg-img {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: none;
    }
    .post.has-bg .bg-img.flip-y  { transform: scaleY(-1); }
    .post.has-bg .bg-img.flip-x  { transform: scaleX(-1); }
    .post.has-bg .bg-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.55) 35%, rgba(0,0,0,.05) 100%);
    }

  </style>
</head>
<body>

<div class="bar">
  <b>Basta — Social Media</b>
  <div class="sep"></div>
  <span>5 × 10 &nbsp;·&nbsp; Feed 1080 × 1350</span>
  <div class="sep"></div>
  <span>Export: DevTools → inspecionar <b>.post</b> → <kbd>Capture node screenshot</kbd></span>
</div>

<div class="gallery" id="gallery"></div>

function ctaPostHTML(hook, subBold, subBody) {
  return `
  <div class="logo">${SVG_BASTA}</div>
  <div class="cta-content">
    <p class="cta-hook">${hook}</p>
    ${subBold ? `<p class="cta-sub-bold">${subBold}</p>` : ''}

  </div>
  <div class="cta-btn">

    ${WA_ICON}
  </div>`;
}

// ── Template post só com logo Open Finance centralizado ─────────────────
function ofOnlyPostHTML(hook = '', body = '') {
  return `
  <div class="logo">${SVG_BASTA}</div>
  <div class="of-center">
    ${SVG_OF}
    ${hook ? `<p class="of-hook">${hook}</p>` : ''}
    ${body ? `<p class="of-body">${body}</p>` : ''}
  </div>`;
}

// ── Template de um post ──────────────────────────────────────────────────
function postHTML(hook, ofHeader, ofCta, ofSub, bgImage = null, noOF = false, flipBg = '', bgPos = '', bgFilter = '', body = '', hookXl = false) {
  const ofBlock = noOF ? '' : `
    <div class="post-sep"></div>
    <div class="of-block">
      <div class="of-logo">${SVG_OF}</div>
      <p class="of-header">${ofHeader}</p>
      <p class="of-cta">${ofCta}</p>
      <p class="of-sub">${ofSub}</p>
    </div>`;
  const bgLayer = bgImage ? `
  <div class="bg-img${flipBg ? ' ' + flipBg : ''}" style="background-image:url('${bgImage}');${bgPos?`background-position:${bgPos};`:''}${bgFilter?`filter:${bgFilter};`:''}"></div>
  <div class="bg-overlay"></div>` : '';
  return `
  ${bgLayer}
  <div class="logo">${SVG_BASTA}</div>
  <div class="content">
    <p class="hook${hookXl ? ' hook-xl' : ''}">${hook}</p>
    ${body ? `<p class="body">${body}</p>` : ''}
    ${ofBlock}
  </div>`;
}
